name: linux

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  security-gates:
    name: linux-security-gates
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cppcheck

      - name: Install Rust toolchain
        shell: bash
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup toolchain install stable --profile minimal
            rustup default stable
          else
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | \
              sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustc --version
          cargo --version

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: C static analysis
        run: make analyze-cppcheck

      - name: Rust dependency audit
        run: make audit-deps

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gcc
            runner: ubuntu-24.04
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O2 -g -fno-omit-frame-pointer"
            package_target: linux-x86_64
          - name: linux-aarch64-gcc
            runner: ubuntu-24.04-arm
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O2 -g -fno-omit-frame-pointer"
            package_target: linux-aarch64
          - name: linux-x86_64-sanitizer
            runner: ubuntu-24.04
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
            package_target: linux-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake git python3

      - name: Build liburing
        run: |
          liburing_dir="$(mktemp -d "${TMPDIR:-/tmp}/llam-liburing.XXXXXX")"
          liburing_commit="e3d35ea59d3ba09075ed4d7751e4bb9049cce64a"
          trap 'rm -rf "$liburing_dir"' EXIT
          git init "$liburing_dir"
          git -C "$liburing_dir" remote add origin https://github.com/axboe/liburing.git
          git -C "$liburing_dir" fetch --depth 1 origin "$liburing_commit"
          git -C "$liburing_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$liburing_dir" rev-parse HEAD)" = "$liburing_commit"
          make -C "$liburing_dir" -j"$(nproc)"
          sudo make -C "$liburing_dir" install
          sudo ldconfig

      - name: Make sanitizer build
        if: ${{ contains(matrix.name, 'sanitizer') }}
        run: |
          make clean all \
            test_abi_contract \
            test_abi_compat \
            test_windows_policy \
            test_shared_load \
            shared \
            CC="${{ matrix.cc }}" \
            CFLAGS="${{ matrix.cflags }}"

      - name: Verify Linux
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: make verify-linux CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}"

      - name: Sanitizer smoke
        if: ${{ contains(matrix.name, 'sanitizer') }}
        run: |
          # GCC ASan does not reliably model LLAM's hand-written stackful
          # context switches without fiber annotations. Keep this job focused on
          # sanitizer-instrumented ABI/policy/load tests and leave scheduler
          # stress to the native Linux and dedicated stress matrices.
          ./test_abi_contract
          ./test_windows_policy
          ./test_shared_load ./libllam_runtime.so.2.0.0

      - name: CMake build
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          cmake -S . -B build/linux -DCMAKE_C_COMPILER=gcc -DCMAKE_ASM_COMPILER=gcc
          cmake --build build/linux
          # The Make-based Verify Linux step above owns the full runtime suite.
          # Keep CMake here as a build/package smoke so a single ctest hang does
          # not mask the already-completed full native verification.
          ctest --test-dir build/linux --output-on-failure --timeout 120 -R "test_abi_contract|test_abi_compat|test_connect_io|test_runtime_core|test_multi_runtime_core|test_shared_load"

      - name: Benchmark smoke
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          for case in spawn_join select_recv_ready select_park_wake select_timeout; do
            LLAM_BENCH_ONLY="$case" \
            LLAM_BENCH_ROUNDS=1 \
            LLAM_BENCH_SELECT_OPS=128 \
            ./bench
          done

      - name: Package smoke
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          ./scripts/install.sh --dry-run --target "${{ matrix.package_target }}" | grep '/releases/download/v2.0.0/'
          LLAM_RELEASE_VERSION=ci LLAM_VERSION=2.0.0 LLAM_ABI_MAJOR=2 ./scripts/package_release.sh "${{ matrix.package_target }}"
          tar -tf "target/dist/llam-ci-${{ matrix.package_target }}.tar.xz" > package-files.txt
          grep '/CHANGELOG.md$' package-files.txt
          grep '/include/llam/runtime.h$' package-files.txt
          grep '/include/llam/io.h$' package-files.txt
          grep '/examples/demo_internal.h$' package-files.txt
          grep '/examples/bench_support.c$' package-files.txt
          grep '/examples/server_flood_stats.c$' package-files.txt
          grep '/examples/server_flood_stats.h$' package-files.txt
          grep '/examples/stress_internal.h$' package-files.txt
          grep '/examples/env_compat.h$' package-files.txt
          grep '/share/llam/cmake/llam-config.cmake$' package-files.txt
          grep '/lib/pkgconfig/llam.pc$' package-files.txt
          tmp_install="$(mktemp -d)"
          trap 'rm -rf "$tmp_install"' EXIT
          tar -C "$tmp_install" -xJf "target/dist/llam-ci-${{ matrix.package_target }}.tar.xz"
          pkg_root="$tmp_install/llam-ci-${{ matrix.package_target }}"
          sh "$pkg_root/install.sh" --dry-run --prefix "$tmp_install/prefix" |
            grep 'copy .*/include -> .*/include'
          cc -std=c11 -Wall -Wextra -Wpedantic -Werror \
            -I"$pkg_root/include" -I"$pkg_root/examples" \
            "$pkg_root/examples/demo.c" \
            "$pkg_root/examples/demo_tasks.c" \
            "$pkg_root/examples/demo_entry.c" \
            "$pkg_root/lib/libllam_runtime.a" \
            -pthread -luring -lm \
            -o "$tmp_install/demo-from-sdk"
          cc -std=c11 -Wall -Wextra -Wpedantic -Werror \
            -I"$pkg_root/include" -I"$pkg_root/examples" \
            "$pkg_root/examples/bench.c" \
            "$pkg_root/examples/bench_support.c" \
            "$pkg_root/examples/bench_entry.c" \
            "$pkg_root/lib/libllam_runtime.a" \
            -pthread -luring -lm \
            -o "$tmp_install/bench-from-sdk"
          mkdir -p "$tmp_install/prefix/include/llam"
          printf 'sentinel\n' > "$tmp_install/prefix/include/llam/runtime.h"
          if "$tmp_install/llam-ci-${{ matrix.package_target }}/install.sh" --prefix "$tmp_install/prefix" > "$tmp_install/install.out" 2>&1; then
            echo "installer overwrote an existing SDK file without --force" >&2
            cat "$tmp_install/install.out"
            exit 1
          fi
          grep 'refusing to overwrite' "$tmp_install/install.out"
          ln -s "$tmp_install/outside" "$tmp_install/prefix-link"
          mkdir -p "$tmp_install/outside"
          if "$tmp_install/llam-ci-${{ matrix.package_target }}/install.sh" --prefix "$tmp_install/prefix-link" --force > "$tmp_install/install-symlink.out" 2>&1; then
            echo "installer followed a symlink install prefix" >&2
            cat "$tmp_install/install-symlink.out"
            exit 1
          fi
          grep 'refusing symlink component in install prefix' "$tmp_install/install-symlink.out"
          test ! -e "$tmp_install/outside/include/llam/runtime.h"
          "$tmp_install/llam-ci-${{ matrix.package_target }}/install.sh" --prefix "$tmp_install/prefix" --force
          test -f "$tmp_install/prefix/share/llam/CHANGELOG.md"
          rm -rf "$tmp_install" package-files.txt
