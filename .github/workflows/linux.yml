name: linux

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gcc
            runner: ubuntu-24.04
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O2 -g -fno-omit-frame-pointer"
            package_target: linux-x86_64
          - name: linux-aarch64-gcc
            runner: ubuntu-24.04-arm
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O2 -g -fno-omit-frame-pointer"
            package_target: linux-aarch64
          - name: linux-x86_64-sanitizer
            runner: ubuntu-24.04
            cc: gcc
            cflags: "-std=c11 -Wall -Wextra -Wpedantic -Werror -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
            package_target: linux-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake git python3

      - name: Build liburing
        run: |
          git clone --depth 1 https://github.com/axboe/liburing.git /tmp/liburing
          make -C /tmp/liburing -j"$(nproc)"
          sudo make -C /tmp/liburing install
          sudo ldconfig

      - name: Make sanitizer build
        if: ${{ contains(matrix.name, 'sanitizer') }}
        run: make clean all CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}"

      - name: Verify Linux
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: make verify-linux CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}"

      - name: Sanitizer smoke
        if: ${{ contains(matrix.name, 'sanitizer') }}
        run: |
          # GCC ASan does not reliably model LLAM's hand-written stackful
          # context switches without fiber annotations. Keep this job focused on
          # sanitizer-instrumented ABI/policy/load tests and leave scheduler
          # stress to the native Linux and dedicated stress matrices.
          ./test_abi_contract
          ./test_abi_compat
          ./test_windows_policy
          ./test_shared_load ./libllam_runtime.so.1.0.1

      - name: CMake build
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          cmake -S . -B build/linux -DCMAKE_C_COMPILER=gcc -DCMAKE_ASM_COMPILER=gcc
          cmake --build build/linux
          ctest --test-dir build/linux --output-on-failure

      - name: Benchmark smoke
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          for case in spawn_join select_recv_ready select_park_wake select_timeout; do
            LLAM_BENCH_ONLY="$case" \
            LLAM_BENCH_ROUNDS=1 \
            LLAM_BENCH_SELECT_OPS=128 \
            ./bench
          done

      - name: Package smoke
        if: ${{ !contains(matrix.name, 'sanitizer') }}
        run: |
          LLAM_RELEASE_VERSION=ci LLAM_VERSION=1.0.1 ./scripts/package_release.sh "${{ matrix.package_target }}"
          tar -tf "target/dist/llam-ci-${{ matrix.package_target }}.tar.xz" > package-files.txt
          grep '/include/llam/runtime.h$' package-files.txt
          grep '/share/llam/cmake/llam-config.cmake$' package-files.txt
          grep '/lib/pkgconfig/llam.pc$' package-files.txt
