name: Stress

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:
    inputs:
      stress_rounds:
        description: Runtime stress rounds per phase
        required: false
        default: "2"
      dynamic_rounds:
        description: Dynamic stress rounds per phase
        required: false
        default: "2"
      runtime_stress_repeat:
        description: Re-run the direct runtime stress binary this many times
        required: false
        default: "5"
      runtime_invariant_repeat:
        description: Re-run seeded runtime invariant checks this many times
        required: false
        default: "10"
      server_seed:
        description: Deterministic seed for server composite edge/correctness phases
        required: false
        default: "1234"
      server_mode:
        description: Run server composite stress
        required: false
        default: "quick"
        type: choice
        options:
          - "quick"
          - "standard"

permissions:
  contents: read

concurrency:
  group: stress-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  posix-runtime-stress:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-stress
            runner: ubuntu-24.04
            cc: gcc
          - name: linux-aarch64-stress
            runner: ubuntu-24.04-arm
            cc: gcc
          - name: macos-aarch64-stress
            runner: macos-14
            cc: clang
          - name: macos-x86_64-stress
            runner: macos-15-intel
            cc: clang

    env:
      STRESS_ROUNDS: ${{ github.event.inputs.stress_rounds || '2' }}
      DYNAMIC_ROUNDS: ${{ github.event.inputs.dynamic_rounds || '2' }}
      RUNTIME_STRESS_REPEAT: ${{ github.event.inputs.runtime_stress_repeat || '5' }}
      RUNTIME_INVARIANT_REPEAT: ${{ github.event.inputs.runtime_invariant_repeat || '10' }}
      SERVER_SEED: ${{ github.event.inputs.server_seed || '1234' }}
      SERVER_MODE: ${{ github.event.inputs.server_mode || 'quick' }}
      OUT_DIR: .artifacts/stress/${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates cmake git python3 xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/axboe/liburing.git /tmp/liburing
          make -C /tmp/liburing -j"$(nproc)"
          sudo make -C /tmp/liburing install
          sudo ldconfig

      - name: Configure
        run: |
          cmake -S . -B build/stress \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_ASM_COMPILER="${{ matrix.cc }}"

      - name: Build stress targets
        run: cmake --build build/stress -j 4

      - name: Unit tests
        run: |
          set -o pipefail
          mkdir -p "$OUT_DIR"
          ctest --test-dir build/stress --output-on-failure 2>&1 | tee "$OUT_DIR/ctest.log"

      - name: Direct runtime stress repeat
        run: |
          set -o pipefail
          mkdir -p "$OUT_DIR"
          for i in $(seq 1 "$RUNTIME_STRESS_REPEAT"); do
            echo "[test_runtime_stress repeat $i/$RUNTIME_STRESS_REPEAT]"
            ./build/stress/test_runtime_stress
          done 2>&1 | tee "$OUT_DIR/test_runtime_stress_repeat.log"

      - name: Seeded runtime invariant repeat
        run: |
          set -o pipefail
          mkdir -p "$OUT_DIR"
          for i in $(seq 1 "$RUNTIME_INVARIANT_REPEAT"); do
            seed=$((SERVER_SEED + i * 104729))
            echo "[test_runtime_invariants repeat $i/$RUNTIME_INVARIANT_REPEAT seed=$seed]"
            LLAM_RUNTIME_INVARIANT_SEED="$seed" \
            LLAM_RUNTIME_INVARIANT_SCENARIOS=48 \
              ./build/stress/test_runtime_invariants
          done 2>&1 | tee "$OUT_DIR/test_runtime_invariants_repeat.log"

      - name: Runtime stress
        run: |
          mkdir -p "$OUT_DIR"
          export LLAM_STRESS_ROUNDS="$STRESS_ROUNDS"
          export LLAM_STRESS_DYNAMIC_ROUNDS="$DYNAMIC_ROUNDS"
          export LLAM_STRESS_DYNAMIC_LIVE_POLL_WAITERS=64
          export LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_ROUNDS=512
          export LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_US=1000
          timeout=900
          if [ "$RUNNER_OS" = "macOS" ]; then
            # Hosted macOS runners are used as fast Darwin smoke lanes. The
            # heavier dynamic live-watch pressure remains covered by Linux
            # stress, Windows stress, and scheduled soak/deep jobs.
            export LLAM_STRESS_ROUNDS=1
            export LLAM_STRESS_DYNAMIC_ROUNDS=1
            export LLAM_STRESS_DYNAMIC_LIVE_POLL_WAITERS=32
            export LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_ROUNDS=256
            timeout=180
          fi
          python3 scripts/run_with_timeout.py \
            --timeout "$timeout" \
            --dump-on-timeout "$OUT_DIR/runtime_stress.timeout-dump.log" \
            --log "$OUT_DIR/runtime_stress.log" \
            -- ./build/stress/stress

      - name: I/O benchmark stress smoke
        run: |
          set -o pipefail
          LLAM_BENCH_ROUNDS=3 \
          LLAM_BENCH_WARMUP_ROUNDS=1 \
          LLAM_BENCH_SELECT_OPS=128 \
          LLAM_BENCH_IO_MESSAGES=128 \
          LLAM_BENCH_POLL_EVENTS=128 \
          ./build/stress/bench 2>&1 | tee "$OUT_DIR/bench_smoke.log"

      - name: Performance guardrail
        run: |
          set -o pipefail
          python3 scripts/bench_guard.py \
            --bench ./build/stress/bench \
            --out "$OUT_DIR/perf_guard.json" 2>&1 | tee "$OUT_DIR/perf_guard.log"

      - name: Server composite stress
        run: |
          set -o pipefail
          args=""
          if [ "$SERVER_MODE" = "quick" ]; then
            args="--quick"
          fi
          if [ "${{ matrix.name }}" = "macos-aarch64-stress" ]; then
            # Hosted macOS quick runs are stability smoke tests for the
            # example server. Linux, Windows, and the scheduled soak profile
            # carry the heavier adversarial churn/slow-client coverage.
            args="$args --skip-edge"
            export LLAM_SERVER_COMPOSITE_EDGE_CLIENTS=4
            export LLAM_SERVER_COMPOSITE_CHURN_THREADS=0
            export LLAM_SERVER_COMPOSITE_SLOW_THREADS=0
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_8B_TARGET_MPS=0.040
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_8B_MIN_DELIVERY_MPS=0.050
          fi
          if [ "${{ matrix.name }}" = "macos-x86_64-stress" ]; then
            # Hosted Intel macOS is kept as a runtime/bench/correctness/flood
            # smoke lane. Edge churn coverage remains on macOS arm64, Linux
            # x86_64/aarch64, and Windows 2022/2025, where crash diagnostics are
            # more reliable and the runners are less noisy.
            args="$args --skip-edge"
            export LLAM_SERVER_COMPOSITE_EDGE_CLIENTS=4
            export LLAM_SERVER_COMPOSITE_CHURN_THREADS=0
            export LLAM_SERVER_COMPOSITE_SLOW_THREADS=0
            export LLAM_SERVER_COMPOSITE_QUICK_LOSSLESS_TARGET_MPS=0.005
            export LLAM_SERVER_COMPOSITE_QUICK_LOSSLESS_MIN_DELIVERY_MPS=0.010
            export LLAM_SERVER_COMPOSITE_QUICK_LOSSLESS_1KB_TARGET_MPS=0.005
            export LLAM_SERVER_COMPOSITE_QUICK_LOSSLESS_1KB_MIN_DELIVERY_MPS=0.010
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_8B_TARGET_MPS=0.040
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_8B_MIN_DELIVERY_MPS=0.050
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_64B_TARGET_MPS=0.025
            export LLAM_SERVER_COMPOSITE_QUICK_THROUGHPUT_64B_MIN_DELIVERY_MPS=0.040
          fi
          python3 scripts/stress_server_composite.py \
            --server ./build/stress/server \
            --server-flood ./build/stress/server_flood \
            --seed "$SERVER_SEED" \
            $args 2>&1 | tee "$OUT_DIR/server_composite.log"

      - name: Upload stress diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stress-diagnostics-${{ matrix.name }}
          path: .artifacts/stress/${{ matrix.name }}
          if-no-files-found: ignore

  windows-runtime-stress:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-2022-x86_64-stress
            runner: windows-2022
          - name: windows-2025-x86_64-stress
            runner: windows-2025
    env:
      RUNTIME_INVARIANT_REPEAT: ${{ github.event.inputs.runtime_invariant_repeat || '10' }}
      SERVER_SEED: ${{ github.event.inputs.server_seed || '1234' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build/windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build native Windows backend
        shell: pwsh
        run: cmake --build build/windows --config Release --target bench test_abi_compat test_runtime_stress test_runtime_fuzz test_runtime_invariants test_windows_runtime_smoke test_windows_policy test_windows_iocp_io test_windows_handle_io

      - name: CTest Windows backend
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          ctest --test-dir build/windows --output-on-failure -C Release -R "test_abi_compat|test_runtime_stress|test_runtime_fuzz|test_runtime_invariants|test_windows_policy|test_windows_runtime_smoke|test_windows_iocp_io|test_windows_handle_io" *>&1 |
            Tee-Object -FilePath "$artifactDir\ctest.log"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Direct runtime stress repeat
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $repeat = [int]("${{ github.event.inputs.runtime_stress_repeat || '5' }}")
          $test = ".\build\windows\Release\test_runtime_stress.exe"
          & {
            for ($i = 1; $i -le $repeat; $i++) {
              "[test_runtime_stress repeat $i/$repeat]"
              & $test
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
          } *>&1 | Tee-Object -FilePath "$artifactDir\test_runtime_stress_repeat.log"

      - name: Seeded runtime invariant repeat
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $repeat = [int]($env:RUNTIME_INVARIANT_REPEAT)
          $seedBase = [int64]($env:SERVER_SEED)
          $test = ".\build\windows\Release\test_runtime_invariants.exe"
          & {
            for ($i = 1; $i -le $repeat; $i++) {
              $seed = $seedBase + ($i * 104729)
              "[test_runtime_invariants repeat $i/$repeat seed=$seed]"
              $env:LLAM_RUNTIME_INVARIANT_SEED = [string]$seed
              $env:LLAM_RUNTIME_INVARIANT_SCENARIOS = "48"
              & $test
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
            Remove-Item Env:\LLAM_RUNTIME_INVARIANT_SEED -ErrorAction SilentlyContinue
            Remove-Item Env:\LLAM_RUNTIME_INVARIANT_SCENARIOS -ErrorAction SilentlyContinue
          } *>&1 | Tee-Object -FilePath "$artifactDir\test_runtime_invariants_repeat.log"

      - name: Forced Windows 10/11 policy stress
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          foreach ($generation in @("10", "11")) {
            $env:LLAM_WINDOWS_FORCE_GENERATION = $generation
            ctest --test-dir build/windows --output-on-failure -C Release -R "test_abi_compat|test_runtime_stress|test_runtime_fuzz|test_runtime_invariants|test_windows_policy|test_windows_runtime_smoke|test_windows_iocp_io|test_windows_handle_io" *>&1 |
              Tee-Object -FilePath "$artifactDir\forced-windows-$generation.log"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
            $env:LLAM_WINDOWS_IOCP_TCP_POLLIN = "1"
            ctest --test-dir build/windows --output-on-failure -C Release -R "test_windows_iocp_io" *>&1 |
              Tee-Object -FilePath "$artifactDir\forced-windows-$generation-tcp-pollin.log"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
            Remove-Item Env:\LLAM_WINDOWS_IOCP_TCP_POLLIN -ErrorAction SilentlyContinue
          }
          Remove-Item Env:\LLAM_WINDOWS_FORCE_GENERATION -ErrorAction SilentlyContinue

      - name: Scheduler and IOCP benchmark stress smoke
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          $bench = ".\build\windows\Release\bench.exe"
          & {
            foreach ($case in @("spawn_join", "channel_pingpong", "select_recv_ready", "select_park_wake", "select_timeout", "io_echo", "poll_wake", "sleep_fanout", "opaque_block")) {
              $env:LLAM_BENCH_ONLY = $case
              $env:LLAM_BENCH_ROUNDS = "3"
              $env:LLAM_BENCH_WARMUP_ROUNDS = "1"
              $env:LLAM_BENCH_SELECT_OPS = "128"
              & $bench
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
          } *>&1 | Tee-Object -FilePath "$artifactDir\bench_smoke.log"

      - name: Performance guardrail
        shell: pwsh
        run: |
          $artifactDir = ".artifacts\stress\${{ matrix.name }}"
          python scripts\bench_guard.py --bench ".\build\windows\Release\bench.exe" --out "$artifactDir\perf_guard.json" *>&1 |
            Tee-Object -FilePath "$artifactDir\perf_guard.log"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload stress diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stress-diagnostics-${{ matrix.name }}
          path: .artifacts/stress/${{ matrix.name }}
          if-no-files-found: ignore
