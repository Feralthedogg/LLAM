name: Runtime Benchmarks

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: Benchmark measurement rounds
        required: false
        default: "9"
      warmup:
        description: Benchmark warmup rounds
        required: false
        default: "1"
  schedule:
    - cron: "0 18 * * 0"

concurrency:
  group: runtime-benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compare:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            cc: gcc
          - name: macos-aarch64
            runner: macos-14
            cc: clang
          - name: macos-x86_64
            runner: macos-15-intel
            cc: clang
          - name: windows-2022-x86_64
            runner: windows-2022
            cc: cl
          - name: windows-2025-x86_64
            runner: windows-2025
            cc: cl

    env:
      ROUNDS: ${{ github.event.inputs.rounds || '9' }}
      WARMUP: ${{ github.event.inputs.warmup || '1' }}
      OUT_DIR: .artifacts/bench-runtime/${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Rust toolchain
        shell: bash
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup toolchain install stable --profile minimal
            rustup default stable
          else
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | \
              sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustc --version
          cargo --version

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates git python3 python3-pip xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          liburing_dir="$(mktemp -d "${TMPDIR:-/tmp}/llam-liburing.XXXXXX")"
          liburing_commit="e3d35ea59d3ba09075ed4d7751e4bb9049cce64a"
          trap 'rm -rf "$liburing_dir"' EXIT
          git init "$liburing_dir"
          git -C "$liburing_dir" remote add origin https://github.com/axboe/liburing.git
          git -C "$liburing_dir" fetch --depth 1 origin "$liburing_commit"
          git -C "$liburing_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$liburing_dir" rev-parse HEAD)" = "$liburing_commit"
          make -C "$liburing_dir" -j"$(nproc)"
          sudo make -C "$liburing_dir" install
          sudo ldconfig

      - name: Install graph dependencies
        shell: bash
        run: python -m pip install --upgrade pip matplotlib

      - name: Compare LLAM, Go, and Tokio
        shell: bash
        run: |
          python scripts/bench_runtime_compare.py \
            --runtime all \
            --rounds "$ROUNDS" \
            --warmup "$WARMUP" \
            --timeout 240 \
            --out-dir "$OUT_DIR"
        env:
          CC: ${{ matrix.cc }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: runtime-bench-${{ matrix.name }}
          path: .artifacts/bench-runtime/${{ matrix.name }}
          if-no-files-found: error
