name: bsd

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: bsd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: ${{ matrix.os == 'dragonflybsd' }}
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: freebsd-x86_64
            os: freebsd
            version: '15.0'
            arch: x86-64
            package_target: freebsd-x86_64
          - name: openbsd-x86_64
            os: openbsd
            version: '7.8'
            arch: x86-64
            package_target: openbsd-x86_64
          - name: netbsd-x86_64
            os: netbsd
            version: '10.1'
            arch: x86-64
            package_target: netbsd-x86_64
          - name: dragonflybsd-x86_64
            os: dragonflybsd
            version: '6.4.2'
            arch: x86-64
            package_target: dragonflybsd-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Start BSD VM
        uses: cross-platform-actions/action@v1.1.0
        timeout-minutes: 10
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          architecture: ${{ matrix.arch }}
          shell: sh
          memory: 6G
          cpu_count: 2

      - name: Install packages
        run: |
          set -eu
          skip_file=".llam-bsd-infra-skip"
          rm -f "$skip_file"
          retry() {
            attempts=0
            max_attempts="${LLAM_BSD_PKG_RETRIES:-10}"
            delay_seconds="${LLAM_BSD_PKG_RETRY_DELAY:-30}"
            while ! "$@"; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep "$delay_seconds"
            done
          }
          case "$(uname -s)" in
            FreeBSD|DragonFly)
              system_name="$(uname -s)"
              packages=""
              if ! command -v gmake >/dev/null 2>&1; then
                packages="$packages gmake"
              fi
              if ! command -v cmake >/dev/null 2>&1; then
                packages="$packages cmake"
              fi
              if ! command -v xz >/dev/null 2>&1; then
                packages="$packages xz"
              fi
              if [ -n "$packages" ]; then
                if [ "$system_name" = DragonFly ]; then
                  if ! retry sudo pkg update -f; then
                    echo "DragonFlyBSD pkg repository unavailable; skipping this infrastructure-gated job." | tee "$skip_file"
                    exit 0
                  fi
                fi
                if ! retry sudo pkg install -y $packages; then
                  if [ "$system_name" = DragonFly ]; then
                    echo "DragonFlyBSD pkg install unavailable; skipping this infrastructure-gated job." | tee "$skip_file"
                    exit 0
                  fi
                  exit 1
                fi
              fi
              ;;
            OpenBSD)
              if ! command -v gmake >/dev/null 2>&1; then
                retry sudo pkg_add gmake
              fi
              if ! command -v cmake >/dev/null 2>&1; then
                retry sudo pkg_add cmake
              fi
              if ! command -v xz >/dev/null 2>&1; then
                retry sudo pkg_add xz
              fi
              ;;
            NetBSD)
              if ! command -v gmake >/dev/null 2>&1; then
                retry sudo pkgin -y install gmake
              fi
              if ! command -v cmake >/dev/null 2>&1; then
                retry sudo pkgin -y install cmake
              fi
              if ! command -v xz >/dev/null 2>&1; then
                retry sudo pkgin -y install xz
              fi
              ;;
          esac
          command -v cc
          command -v gmake
          command -v cmake
          command -v xz

      - name: Build and run core tests
        run: |
          set -eu
          if [ -f .llam-bsd-infra-skip ]; then
            cat .llam-bsd-infra-skip
            exit 0
          fi
          run_with_timeout() {
            label="$1"
            timeout_seconds="$2"
            shift 2
            echo "[$label] $*"
            "$@" &
            pid="$!"
            elapsed=0
            while kill -0 "$pid" 2>/dev/null; do
              if [ "$elapsed" -ge "$timeout_seconds" ]; then
                echo "[$label] timed out after ${timeout_seconds}s; killing pid ${pid}" >&2
                kill -TERM "$pid" 2>/dev/null || true
                sleep 2
                kill -KILL "$pid" 2>/dev/null || true
                wait "$pid" 2>/dev/null || true
                return 124
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            wait "$pid"
          }
          gmake clean
          gmake -j2 static \
            shared \
            test_abi_contract \
            test_abi_compat \
            test_runtime_core \
            test_multi_runtime_core \
            test_runtime_api_edges \
            test_runtime_select_edges \
            test_io_buffers \
            test_shared_load \
            CC=cc
          run_with_timeout test_abi_contract 120 ./test_abi_contract
          run_with_timeout test_abi_compat 120 ./test_abi_compat
          run_with_timeout test_runtime_core 240 ./test_runtime_core
          run_with_timeout test_multi_runtime_core 240 ./test_multi_runtime_core
          run_with_timeout test_runtime_api_edges 300 env LLAM_API_EDGE_CANCEL_RACE_ROUNDS=256 ./test_runtime_api_edges
          run_with_timeout test_runtime_select_edges 120 ./test_runtime_select_edges
          run_with_timeout test_io_buffers 120 ./test_io_buffers
          run_with_timeout test_shared_load 120 ./test_shared_load ./libllam_runtime.so.2.0.0

      - name: CMake build and CTest smoke
        run: |
          set -eu
          if [ -f .llam-bsd-infra-skip ]; then
            cat .llam-bsd-infra-skip
            exit 0
          fi
          cmake -S . -B build/bsd -DCMAKE_C_COMPILER=cc -DCMAKE_ASM_COMPILER=cc
          cmake --build build/bsd --parallel 2 --target \
            test_abi_contract \
            test_abi_compat \
            test_runtime_core \
            test_multi_runtime_core \
            test_runtime_api_edges \
            test_runtime_select_edges \
            test_io_buffers \
            test_shared_load
          ctest --test-dir build/bsd --output-on-failure --timeout 900 \
            -R 'test_abi_contract|test_abi_compat|test_runtime_core|test_multi_runtime_core|test_runtime_select_edges|test_io_buffers|test_shared_load'

      - name: Package smoke
        run: |
          set -eu
          if [ -f .llam-bsd-infra-skip ]; then
            cat .llam-bsd-infra-skip
            exit 0
          fi
          gmake -j2 demo stress bench server server_lossless server_flood static shared CC=cc
          ./scripts/install.sh --dry-run --target "${{ matrix.package_target }}" | grep '/releases/download/v2.0.0/'
          LLAM_RELEASE_VERSION=ci LLAM_VERSION=2.0.0 LLAM_ABI_MAJOR=2 \
            ./scripts/package_release.sh "${{ matrix.package_target }}"
          if ! tar -tf "target/dist/llam-ci-${{ matrix.package_target }}.tar.xz" > package-files.txt 2>/dev/null; then
            xz -dc "target/dist/llam-ci-${{ matrix.package_target }}.tar.xz" | tar -tf - > package-files.txt
          fi
          grep '/include/llam/platform.h$' package-files.txt
          grep '/lib/libllam_runtime.a$' package-files.txt
          grep '/lib/libllam_runtime.so$' package-files.txt
          grep '/share/llam/cmake/llam-config.cmake$' package-files.txt
          grep '/lib/pkgconfig/llam.pc$' package-files.txt
