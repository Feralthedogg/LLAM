name: Weekly Soak

on:
  schedule:
    - cron: "15 16 * * 6"
  workflow_dispatch:
    inputs:
      seed:
        description: Deterministic seed for server composite soak
        required: false
        default: "9001"

permissions:
  contents: read

concurrency:
  group: weekly-soak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  posix-hour-soak:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-hour-soak
            runner: ubuntu-24.04
            cc: gcc
          - name: macos-aarch64-hour-soak
            runner: macos-14
            cc: clang

    env:
      OUT_DIR: .artifacts/soak/${{ matrix.name }}
      SOAK_SEED: ${{ github.event.inputs.seed || '9001' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates cmake git python3 xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          liburing_dir="$(mktemp -d "${TMPDIR:-/tmp}/llam-liburing.XXXXXX")"
          liburing_commit="e3d35ea59d3ba09075ed4d7751e4bb9049cce64a"
          trap 'rm -rf "$liburing_dir"' EXIT
          git init "$liburing_dir"
          git -C "$liburing_dir" remote add origin https://github.com/axboe/liburing.git
          git -C "$liburing_dir" fetch --depth 1 origin "$liburing_commit"
          git -C "$liburing_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$liburing_dir" rev-parse HEAD)" = "$liburing_commit"
          make -C "$liburing_dir" -j"$(nproc)"
          sudo make -C "$liburing_dir" install
          sudo ldconfig

      - name: Configure
        run: |
          cmake -S . -B build/soak \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_ASM_COMPILER="${{ matrix.cc }}"

      - name: Build
        run: cmake --build build/soak -j 4

      - name: Pre-soak unit gate
        run: |
          set -o pipefail
          python3 scripts/safe_output.py --prepare-dir "$OUT_DIR"
          ctest --test-dir build/soak --output-on-failure 2>&1 | tee "$OUT_DIR/ctest.log"
          for i in $(seq 1 10); do
            echo "[test_runtime_api_edges repeat $i/10]"
            python3 scripts/run_with_timeout.py \
              --timeout 180 \
              --dump-on-timeout "$OUT_DIR/test_runtime_api_edges_repeat_$i.timeout-dump.log" \
              --log "$OUT_DIR/test_runtime_api_edges_repeat_$i.log" \
              -- ./build/soak/test_runtime_api_edges
          done 2>&1 | tee "$OUT_DIR/test_runtime_api_edges_repeat.log"
          for i in $(seq 1 10); do
            seed=$((SOAK_SEED + i * 104729))
            echo "[test_runtime_invariants repeat $i/10 seed=$seed]"
            LLAM_RUNTIME_INVARIANT_SEED="$seed" \
            LLAM_RUNTIME_INVARIANT_SCENARIOS=96 \
              ./build/soak/test_runtime_invariants
          done 2>&1 | tee "$OUT_DIR/test_runtime_invariants_repeat.log"
          for i in $(seq 1 50); do
            echo "[test_runtime_stress repeat $i/50]"
            ./build/soak/test_runtime_stress
          done 2>&1 | tee "$OUT_DIR/test_runtime_stress_repeat.log"

      - name: One-hour server composite soak
        run: |
          set -o pipefail
          python3 scripts/stress_server_composite.py \
            --server ./build/soak/server \
            --server-flood ./build/soak/server_flood \
            --soak-hour \
            --seed "$SOAK_SEED" 2>&1 | tee "$OUT_DIR/server_composite_hour.log"

      - name: Upload soak diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: soak-diagnostics-${{ matrix.name }}
          path: .artifacts/soak/${{ matrix.name }}
          if-no-files-found: ignore
