name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-artifacts:
    name: build-artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            cc: gcc
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            cc: gcc
          - target: macos-x86_64
            runner: macos-15-intel
            cc: clang
          - target: macos-aarch64
            runner: macos-14
            cc: clang
          - target: windows-x86_64
            runner: windows-2025
            cc: msvc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates cmake git python3 xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/axboe/liburing.git /tmp/liburing
          make -C /tmp/liburing -j"$(nproc)"
          sudo make -C /tmp/liburing install
          sudo ldconfig

      - name: Build and test POSIX
        if: runner.os != 'Windows'
        run: |
          version="2.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          make clean all test CC="${{ matrix.cc }}" LLAM_VERSION="$version"

      - name: Smoke test POSIX runtime executables
        if: runner.os != 'Windows'
        run: |
          ./demo
          LLAM_BENCH_ROUNDS=1 LLAM_BENCH_IO_MESSAGES=32 LLAM_BENCH_POLL_EVENTS=32 ./bench
          LLAM_STRESS_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_WAITERS=32 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_ROUNDS=256 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_US=1000 \
          ./stress

      - name: Package POSIX release archive
        if: runner.os != 'Windows'
        run: |
          version="2.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          LLAM_RELEASE_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}" \
          LLAM_VERSION="$version" \
            ./scripts/package_release.sh "${{ matrix.target }}"

      - name: Configure Windows release build
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build/release-windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build and test Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build/release-windows --config Release --target bench test_abi_compat test_multi_runtime_core test_runtime_stress test_runtime_fuzz test_runtime_invariants test_runtime_shutdown_internal test_windows_runtime_smoke test_windows_policy test_windows_iocp_io test_windows_handle_io llam_runtime llam_runtime_shared
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          ctest --test-dir build/release-windows --output-on-failure -C Release -R "test_abi_compat|test_multi_runtime_core|test_runtime_stress|test_runtime_fuzz|test_runtime_invariants|test_runtime_shutdown_internal|test_windows_policy|test_windows_runtime_smoke|test_windows_iocp_io|test_windows_handle_io"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $env:LLAM_WINDOWS_IOCP_TCP_POLLIN = "1"
          ctest --test-dir build/release-windows --output-on-failure -C Release -R "test_windows_iocp_io"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Remove-Item Env:\LLAM_WINDOWS_IOCP_TCP_POLLIN -ErrorAction SilentlyContinue
          $env:LLAM_BENCH_ROUNDS = "1"
          $env:LLAM_BENCH_ONLY = "spawn_join"
          .\build\release-windows\Release\bench.exe

      - name: Package Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dryRun = (& .\scripts\install.ps1 -DryRun -Target "${{ matrix.target }}" 6>&1 | Out-String)
          if ($dryRun -notmatch "/releases/download/v2\.0\.0/") {
            throw "standalone Windows installer default URL did not use the v2.0.0 release tag"
          }
          $version = "2.0.0"
          $releaseVersion = "dev"
          if ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $tagName = $env:GITHUB_REF_NAME
            $version = $tagName.TrimStart("v")
            $releaseVersion = $tagName
          }
          .\scripts\package_release_windows.ps1 -Target "${{ matrix.target }}" -BuildDir "build\release-windows" -Configuration Release -Version $releaseVersion -LibraryVersion $version
          $packageVersion = $releaseVersion.TrimStart("v").Replace("/", "-")
          $archive = "target\dist\llam-$packageVersion-${{ matrix.target }}.zip"
          $tmp = Join-Path $env:RUNNER_TEMP "llam-windows-package-smoke"
          Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue
          Expand-Archive $archive -DestinationPath $tmp -Force
          $root = Join-Path $tmp "llam-$packageVersion-${{ matrix.target }}"
          foreach ($file in @(
            "examples\demo_internal.h",
            "examples\bench_support.c",
            "examples\stress_internal.h",
            "examples\env_compat.h"
          )) {
            if (-not (Test-Path (Join-Path $root $file))) {
              throw "missing example package file: $file"
            }
          }

      - name: Upload platform artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            target/dist/*.tar.xz
            target/dist/*.tar.xz.sha256
            target/dist/*.zip
            target/dist/*.zip.sha256
          if-no-files-found: error

  publish-release:
    name: publish-release
    needs:
      - build-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Add standalone installers
        run: |
          cp scripts/install.sh release-artifacts/install.sh
          cp scripts/install.ps1 release-artifacts/install.ps1
          cp CHANGELOG.md release-artifacts/CHANGELOG.md
          cd release-artifacts
          sha256sum install.sh > install.sh.sha256
          sha256sum install.ps1 > install.ps1.sha256
          sha256sum CHANGELOG.md > CHANGELOG.md.sha256

      - name: Build checksum manifest
        run: |
          cd release-artifacts
          cat ./*.sha256 | sort -k2 > SHA256SUMS

      - name: Build release notes
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          cd release-artifacts
          version="${TAG#v}"
          base_url="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          run_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          {
            echo "# LLAM ${version}"
            echo
            echo "LLAM ${version} publishes native runtime builds for Linux, macOS, and Windows x86_64."
            echo
            echo "## Highlights"
            echo
            echo "- Native Darwin x86_64 assembly context switching for Intel Mac builds."
            echo "- kqueue-based macOS I/O backend for both Apple Silicon and Intel Mac."
            echo "- io_uring/liburing Linux I/O backend for x86_64 and aarch64."
            echo "- Windows x86_64 IOCP backend archive with WSARecv/WSASend/AcceptEx/ConnectEx coverage."
            echo "- SDK metadata for CMake and pkg-config consumers."
            echo
            echo "## Downloads"
            echo
            echo "| File | Platform | Checksum |"
            echo "| --- | --- | --- |"
            for row in \
              "linux-x86_64|Linux x86_64" \
              "linux-aarch64|Linux aarch64" \
              "macos-x86_64|macOS x86_64" \
              "macos-aarch64|macOS arm64" \
              "windows-x86_64|Windows x86_64"; do
              target="${row%%|*}"
              label="${row#*|}"
              case "$target" in
                windows-*) ext="zip" ;;
                *) ext="tar.xz" ;;
              esac
              file="llam-${version}-${target}.${ext}"
              checksum="${file}.sha256"
              if [ -f "$file" ]; then
                echo "| [${file}](${base_url}/${file}) | ${label} | [checksum](${base_url}/${checksum}) |"
              fi
            done
            echo
            echo "## Package Contents"
            echo
            echo "- Public headers under \`include/\`."
            echo "- Static runtime library: \`libllam_runtime.a\` on POSIX or \`llam_runtime.lib\` on Windows."
            echo "- Platform shared runtime library: \`libllam_runtime.so\`, \`libllam_runtime.dylib\`, or \`llam_runtime.dll\`."
            echo "- CMake package files under \`share/llam/cmake/\` and pkg-config metadata under \`lib/pkgconfig/\`."
            echo "- Archive installers: \`install.sh --prefix <dir>\` on Linux/macOS and \`install.ps1 -Prefix <dir>\` on Windows."
            echo "- Docs, examples, \`CHANGELOG.md\`, and bundled smoke executables where supported."
            echo
            echo "## Changelog"
            echo
            echo "- [CHANGELOG.md](${base_url}/CHANGELOG.md) is attached to this release and included inside every platform archive."
            echo
            awk '
              /^## 1\.0\.2 / { in_section=1; print; next }
              /^## / && in_section { exit }
              in_section { print }
            ' ../CHANGELOG.md
            echo
            echo "## Standalone Installers"
            echo
            echo "| File | Use | Checksum |"
            echo "| --- | --- | --- |"
            echo "| [install.sh](${base_url}/install.sh) | Linux/macOS release archives | [checksum](${base_url}/install.sh.sha256) |"
            echo "| [install.ps1](${base_url}/install.ps1) | Windows release archives | [checksum](${base_url}/install.ps1.sha256) |"
            echo
            echo "## Install Commands"
            echo
            echo "Linux/macOS auto-detect:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "Linux/macOS explicit target:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --target macos-aarch64 --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "Windows x86_64:"
            echo
            echo "\`\`\`powershell"
            echo "Invoke-WebRequest \"${base_url}/install.ps1\" -OutFile install.ps1; .\\install.ps1 -Version ${version} -BaseUrl \"${base_url}\" -Prefix \"\$env:LOCALAPPDATA\\LLAM\""
            echo "\`\`\`"
            echo
            echo "## Verification"
            echo
            echo "- Release workflow succeeded: ${run_url}"
            echo "- Release target commit: \`${RELEASE_SHA}\`."
            echo "- Full checksum manifest: [SHA256SUMS](${base_url}/SHA256SUMS)."
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: LLAM ${{ github.ref_name }}
          body_path: release-artifacts/RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/*.tar.xz.sha256
            release-artifacts/*.zip
            release-artifacts/*.zip.sha256
            release-artifacts/install.sh
            release-artifacts/install.sh.sha256
            release-artifacts/install.ps1
            release-artifacts/install.ps1.sha256
            release-artifacts/CHANGELOG.md
            release-artifacts/CHANGELOG.md.sha256
            release-artifacts/SHA256SUMS
