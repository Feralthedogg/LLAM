name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-artifacts:
    name: build-artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            cc: gcc
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            cc: gcc
          - target: macos-x86_64
            runner: macos-15-intel
            cc: clang
          - target: macos-aarch64
            runner: macos-14
            cc: clang
          - target: windows-x86_64
            runner: windows-2025
            cc: msvc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates cmake git python3 xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          liburing_dir="$(mktemp -d "${TMPDIR:-/tmp}/llam-liburing.XXXXXX")"
          liburing_commit="e3d35ea59d3ba09075ed4d7751e4bb9049cce64a"
          trap 'rm -rf "$liburing_dir"' EXIT
          git init "$liburing_dir"
          git -C "$liburing_dir" remote add origin https://github.com/axboe/liburing.git
          git -C "$liburing_dir" fetch --depth 1 origin "$liburing_commit"
          git -C "$liburing_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$liburing_dir" rev-parse HEAD)" = "$liburing_commit"
          make -C "$liburing_dir" -j"$(nproc)"
          sudo make -C "$liburing_dir" install
          sudo ldconfig

      - name: Build and test POSIX
        if: runner.os != 'Windows'
        run: |
          version="2.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          make clean all test CC="${{ matrix.cc }}" LLAM_VERSION="$version"

      - name: Smoke test POSIX runtime executables
        if: runner.os != 'Windows'
        run: |
          ./demo
          LLAM_BENCH_ROUNDS=1 LLAM_BENCH_IO_MESSAGES=32 LLAM_BENCH_POLL_EVENTS=32 ./bench
          LLAM_STRESS_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_WAITERS=32 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_ROUNDS=256 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_US=1000 \
          ./stress

      - name: Package POSIX release archive
        if: runner.os != 'Windows'
        run: |
          version="2.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          LLAM_RELEASE_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}" \
          LLAM_VERSION="$version" \
            ./scripts/package_release.sh "${{ matrix.target }}"
          package_version="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          package_version="${package_version#v}"
          archive="target/dist/llam-${package_version}-${{ matrix.target }}.tar.xz"
          if ! tar -tf "$archive" > package-files.txt 2>/dev/null; then
            xz -dc "$archive" | tar -tf - > package-files.txt
          fi
          grep '/include/llam/runtime.h$' package-files.txt
          grep '/include/llam/io.h$' package-files.txt
          grep '/examples/server_flood_stats.c$' package-files.txt
          grep '/examples/server_flood_stats.h$' package-files.txt
          rm -f package-files.txt
          tmp="$(mktemp -d "${TMPDIR:-/tmp}/llam-release-smoke.XXXXXX")"
          trap 'rm -rf "$tmp"' EXIT
          if ! tar -xf "$archive" -C "$tmp" 2>/dev/null; then
            xz -dc "$archive" | tar -xf - -C "$tmp"
          fi
          sh "$tmp/llam-${package_version}-${{ matrix.target }}/install.sh" --dry-run --prefix "$tmp/prefix" |
            grep 'copy .*/include -> .*/include'
          for file in VERSION ABI_MAJOR LIBRARY_VERSION; do
            test -f "$tmp/llam-${package_version}-${{ matrix.target }}/${file}"
          done
          sh "$tmp/llam-${package_version}-${{ matrix.target }}/install.sh" --prefix "$tmp/prefix-success" --force
          test "$(cat "$tmp/prefix-success/share/llam/VERSION")" = "$package_version"
          test "$(cat "$tmp/prefix-success/share/llam/ABI_MAJOR")" = "2"
          test "$(cat "$tmp/prefix-success/share/llam/LIBRARY_VERSION")" = "$version"
          mkdir -p "$tmp/outside"
          ln -s "$tmp/outside" "$tmp/prefix-link"
          if sh "$tmp/llam-${package_version}-${{ matrix.target }}/install.sh" --prefix "$tmp/prefix-link" --force > "$tmp/install-symlink.out" 2>&1; then
            echo "installer followed a symlink install prefix" >&2
            cat "$tmp/install-symlink.out"
            exit 1
          fi
          grep 'refusing symlink component in install prefix' "$tmp/install-symlink.out"
          test ! -e "$tmp/outside/include/llam/runtime.h"

      - name: Configure Windows release build
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build/release-windows -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build and test Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build/release-windows --config Release --target bench llam_broker test_abi_compat test_multi_runtime_core test_runtime_stress test_runtime_fuzz test_runtime_invariants test_runtime_shutdown_internal test_windows_runtime_smoke test_windows_policy test_windows_iocp_io test_windows_handle_io test_security_capability llam_runtime llam_runtime_shared
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          ctest --test-dir build/release-windows --output-on-failure --timeout 180 -C Release -R "test_abi_compat|test_multi_runtime_core|test_runtime_stress|test_runtime_fuzz|test_runtime_invariants|test_runtime_shutdown_internal|test_windows_policy|test_windows_runtime_smoke|test_windows_iocp_io|test_windows_handle_io|test_security_capability|llam_broker_self_test"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $env:LLAM_WINDOWS_IOCP_TCP_POLLIN = "1"
          ctest --test-dir build/release-windows --output-on-failure --timeout 180 -C Release -R "test_windows_iocp_io"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Remove-Item Env:\LLAM_WINDOWS_IOCP_TCP_POLLIN -ErrorAction SilentlyContinue
          $env:LLAM_BENCH_ROUNDS = "1"
          $env:LLAM_BENCH_ONLY = "spawn_join"
          .\build\release-windows\Release\bench.exe

      - name: Package Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dryRun = (& .\scripts\install.ps1 -DryRun -Target "${{ matrix.target }}" 6>&1 | Out-String)
          if ($dryRun -notmatch "/releases/download/v2\.0\.0/") {
            throw "standalone Windows installer default URL did not use the v2.0.0 release tag"
          }
          $version = "2.0.0"
          $releaseVersion = "dev"
          if ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $tagName = $env:GITHUB_REF_NAME
            $version = $tagName -replace '^v', ''
            $releaseVersion = $tagName
          }
          .\scripts\package_release_windows.ps1 -Target "${{ matrix.target }}" -BuildDir "build\release-windows" -Configuration Release -Version $releaseVersion -LibraryVersion $version
          $packageVersion = $releaseVersion -replace '^v', ''
          $archive = "target\dist\llam-$packageVersion-${{ matrix.target }}.zip"
          $tmp = Join-Path $env:RUNNER_TEMP "llam-windows-package-smoke"
          Remove-Item -Recurse -Force -LiteralPath $tmp -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archive -DestinationPath $tmp -Force
          $root = Join-Path $tmp "llam-$packageVersion-${{ matrix.target }}"
          foreach ($file in @(
            "install.sh",
            "install.ps1",
            "include\llam\runtime.h",
            "include\llam\io.h",
            "include\llam\platform.h",
            "examples\demo_internal.h",
            "examples\bench_support.c",
            "examples\server_flood_stats.c",
            "examples\server_flood_stats.h",
            "examples\stress_internal.h",
            "examples\env_compat.h"
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $root $file))) {
              throw "missing package file: $file"
            }
          }
          $archiveInstall = & (Join-Path $root "install.ps1") -DryRun -Prefix (Join-Path $tmp "prefix") 6>&1 | Out-String
          if ($archiveInstall -notmatch "copy .*include" -or $archiveInstall -notmatch "copy .*lib") {
            throw "archive-local Windows installer dry-run did not copy include/lib"
          }
          foreach ($file in @("VERSION", "ABI_MAJOR", "LIBRARY_VERSION")) {
            if (-not (Test-Path -LiteralPath (Join-Path $root $file))) {
              throw "missing package metadata file: $file"
            }
          }
          $successPrefix = Join-Path $tmp "prefix-success"
          & (Join-Path $root "install.ps1") -Prefix $successPrefix -Force
          if ((Get-Content -LiteralPath (Join-Path $successPrefix "share\llam\VERSION") -Raw).Trim() -ne $packageVersion) {
            throw "archive-local Windows installer did not install VERSION metadata"
          }
          if ((Get-Content -LiteralPath (Join-Path $successPrefix "share\llam\ABI_MAJOR") -Raw).Trim() -ne "2") {
            throw "archive-local Windows installer did not install ABI_MAJOR metadata"
          }
          if ((Get-Content -LiteralPath (Join-Path $successPrefix "share\llam\LIBRARY_VERSION") -Raw).Trim() -ne $version) {
            throw "archive-local Windows installer did not install LIBRARY_VERSION metadata"
          }
          $hardlinkPrefix = Join-Path $tmp "prefix-hardlink"
          $hardlinkHeaderDir = Join-Path $hardlinkPrefix "include\llam"
          New-Item -ItemType Directory -Force -Path $hardlinkHeaderDir | Out-Null
          $outsideHeader = Join-Path $tmp "outside-runtime.h"
          Set-Content -LiteralPath $outsideHeader -Value "outside"
          New-Item -ItemType HardLink -Path (Join-Path $hardlinkHeaderDir "runtime.h") -Target $outsideHeader | Out-Null
          try {
            & (Join-Path $root "install.ps1") -Prefix $hardlinkPrefix -Force
            throw "archive-local Windows installer overwrote a hard-linked destination"
          } catch {
            if ($_.Exception.Message -notmatch "refusing hard-linked destination") {
              throw
            }
          }
          if ((Get-Content -LiteralPath $outsideHeader -Raw) -notmatch "outside") {
            throw "archive-local Windows installer clobbered a hard-linked outside file"
          }
          $directoryPrefix = Join-Path $tmp "prefix-directory-conflict"
          $directoryHeaderDir = Join-Path $directoryPrefix "include\llam"
          New-Item -ItemType Directory -Force -Path (Join-Path $directoryHeaderDir "runtime.h") | Out-Null
          try {
            & (Join-Path $root "install.ps1") -Prefix $directoryPrefix -Force
            throw "archive-local Windows installer accepted a directory where runtime.h must be a file"
          } catch {
            if ($_.Exception.Message -notmatch "refusing directory destination where LLAM expects a file") {
              throw
            }
          }
          $installerSource = Get-Content -LiteralPath (Join-Path $root "install.ps1") -Raw
          $tokens = $null
          $parseErrors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseInput($installerSource, [ref]$tokens, [ref]$parseErrors)
          if ($parseErrors.Count -ne 0) {
            throw "archive-local Windows installer failed to parse"
          }
          $ast.FindAll({ param($node) $node -is [System.Management.Automation.Language.FunctionDefinitionAst] }, $true) |
            ForEach-Object { . ([scriptblock]::Create($_.Extent.Text)) }
          $badPackage = "llam-bad-windows-x86_64"
          $badZip = Join-Path $tmp "bad-reserved.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($badZip, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            [void]$zip.CreateEntry("$badPackage/NUL")
          } finally {
            $zip.Dispose()
          }
          try {
            Assert-SafeZipArchive $badZip $badPackage
            throw "archive-local Windows installer accepted a reserved device-name archive member"
          } catch {
            if ($_.Exception.Message -notmatch "refusing Windows-reserved archive member") {
              throw
            }
          }
          $absoluteZip = Join-Path $tmp "bad-absolute.zip"
          $zip = [System.IO.Compression.ZipFile]::Open($absoluteZip, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            [void]$zip.CreateEntry("$badPackage/install.ps1")
            [void]$zip.CreateEntry("/tmp/llam-windows-escape")
          } finally {
            $zip.Dispose()
          }
          try {
            Assert-SafeZipArchive $absoluteZip $badPackage
            throw "archive-local Windows installer accepted an absolute archive member"
          } catch {
            if ($_.Exception.Message -notmatch "refusing unsafe archive member") {
              throw
            }
          }
          $parentZip = Join-Path $tmp "bad-parent.zip"
          $zip = [System.IO.Compression.ZipFile]::Open($parentZip, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
            [void]$zip.CreateEntry("$badPackage/install.ps1")
            [void]$zip.CreateEntry("$badPackage/../escape")
          } finally {
            $zip.Dispose()
          }
          try {
            Assert-SafeZipArchive $parentZip $badPackage
            throw "archive-local Windows installer accepted a parent-traversal archive member"
          } catch {
            if ($_.Exception.Message -notmatch "refusing unsafe archive member") {
              throw
            }
          }

      - name: Upload platform artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            target/dist/*.tar.xz
            target/dist/*.tar.xz.sha256
            target/dist/*.zip
            target/dist/*.zip.sha256
          if-no-files-found: error

  build-bsd-artifacts:
    name: build-artifacts (${{ matrix.target }})
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: freebsd-x86_64
            os: freebsd
            version: '15.0'
            arch: x86-64
          - target: openbsd-x86_64
            os: openbsd
            version: '7.8'
            arch: x86-64
          - target: netbsd-x86_64
            os: netbsd
            version: '10.1'
            arch: x86-64
          - target: dragonflybsd-x86_64
            os: dragonflybsd
            version: '6.4.2'
            arch: x86-64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Start BSD VM
        uses: cross-platform-actions/action@v1.1.0
        timeout-minutes: 10
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          architecture: ${{ matrix.arch }}
          shell: sh
          memory: 6G
          cpu_count: 2

      - name: Install BSD packages
        run: |
          set -eu
          retry() {
            attempts=0
            max_attempts="${LLAM_BSD_PKG_RETRIES:-10}"
            delay_seconds="${LLAM_BSD_PKG_RETRY_DELAY:-30}"
            while ! "$@"; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep "$delay_seconds"
            done
          }
          case "$(uname -s)" in
            FreeBSD|DragonFly)
              command -v gmake >/dev/null 2>&1 || retry sudo pkg install -y gmake
              command -v cmake >/dev/null 2>&1 || retry sudo pkg install -y cmake
              command -v xz >/dev/null 2>&1 || retry sudo pkg install -y xz
              ;;
            OpenBSD)
              sudo sh -c 'echo https://cdn.openbsd.org/pub/OpenBSD > /etc/installurl'
              command -v gmake >/dev/null 2>&1 || retry sudo pkg_add gmake
              command -v cmake >/dev/null 2>&1 || retry sudo pkg_add cmake
              command -v xz >/dev/null 2>&1 || retry sudo pkg_add xz
              ;;
            NetBSD)
              command -v gmake >/dev/null 2>&1 || retry sudo pkgin -y install gmake
              command -v cmake >/dev/null 2>&1 || retry sudo pkgin -y install cmake
              command -v xz >/dev/null 2>&1 || retry sudo pkgin -y install xz
              ;;
          esac

      - name: Build, test, and package BSD
        run: |
          set -eu
          version="2.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          gmake clean
          gmake -j2 demo \
            stress \
            bench \
            server \
            server_lossless \
            server_flood \
            static \
            shared \
            test_abi_contract \
            test_abi_compat \
            test_runtime_core \
            test_multi_runtime_core \
            test_runtime_api_edges \
            test_runtime_select_edges \
            test_io_buffers \
            test_shared_load \
            CC=cc \
            LLAM_VERSION="$version"
          ./test_abi_contract
          ./test_abi_compat
          ./test_runtime_core
          ./test_multi_runtime_core
          ./test_runtime_api_edges
          ./test_runtime_select_edges
          ./test_io_buffers
          ./test_shared_load ./libllam_runtime.so."$version"
          cmake -S . -B build/bsd -DCMAKE_C_COMPILER=cc -DCMAKE_ASM_COMPILER=cc
          cmake --build build/bsd --parallel 2 --target \
            test_abi_contract \
            test_abi_compat \
            test_runtime_core \
            test_multi_runtime_core \
            test_runtime_api_edges \
            test_runtime_select_edges \
            test_io_buffers \
            test_shared_load
          ctest --test-dir build/bsd --output-on-failure --timeout 180 \
            -R 'test_abi_contract|test_abi_compat|test_runtime_core|test_multi_runtime_core|test_runtime_api_edges|test_runtime_select_edges|test_io_buffers|test_shared_load'
          LLAM_RELEASE_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}" \
          LLAM_VERSION="$version" \
            ./scripts/package_release.sh "${{ matrix.target }}"
          package_version="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          package_version="${package_version#v}"
          archive="target/dist/llam-${package_version}-${{ matrix.target }}.tar.xz"
          if ! tar -tf "$archive" > package-files.txt 2>/dev/null; then
            xz -dc "$archive" | tar -tf - > package-files.txt
          fi
          grep '/include/llam/runtime.h$' package-files.txt
          grep '/include/llam/platform.h$' package-files.txt
          grep '/lib/libllam_runtime.so$' package-files.txt
          grep '/share/llam/cmake/llam-config.cmake$' package-files.txt
          grep '/lib/pkgconfig/llam.pc$' package-files.txt

      - name: Sync BSD artifacts back to runner
        shell: bash
        run: cpa.sh --sync-files vm-to-runner

      - name: Upload BSD platform artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            target/dist/*.tar.xz
            target/dist/*.tar.xz.sha256
          if-no-files-found: error

  publish-release:
    name: publish-release
    needs:
      - build-artifacts
      - build-bsd-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Add standalone installers
        run: |
          cp scripts/install.sh release-artifacts/install.sh
          cp scripts/install.ps1 release-artifacts/install.ps1
          cp CHANGELOG.md release-artifacts/CHANGELOG.md
          cd release-artifacts
          sha256sum install.sh > install.sh.sha256
          sha256sum install.ps1 > install.ps1.sha256
          sha256sum CHANGELOG.md > CHANGELOG.md.sha256

      - name: Build checksum manifest
        run: |
          cd release-artifacts
          cat ./*.sha256 | LC_ALL=C sort -k2 > SHA256SUMS

      - name: Build release notes
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          cd release-artifacts
          version="${TAG#v}"
          base_url="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          run_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          changelog_section="${RUNNER_TEMP}/llam-release-changelog.md"
          awk -v version="$version" '
            index($0, "## " version " ") == 1 || $0 == "## " version {
              in_section=1
              print
              next
            }
            /^## / && in_section { exit }
            in_section { print }
          ' CHANGELOG.md > "$changelog_section"
          if [ ! -s "$changelog_section" ]; then
            echo "missing CHANGELOG.md section for ${version}" >&2
            exit 1
          fi
          {
            echo "# LLAM ${version}"
            echo
            echo "LLAM ${version} publishes native runtime builds for Linux, macOS, BSD, and Windows x86_64."
            echo
            echo "## Highlights"
            echo
            echo "- Native Darwin x86_64 assembly context switching for Intel Mac builds."
            echo "- kqueue-based macOS and BSD I/O backend coverage."
            echo "- io_uring/liburing Linux I/O backend for x86_64 and aarch64."
            echo "- Windows x86_64 IOCP backend archive with WSARecv/WSASend/AcceptEx/ConnectEx coverage."
            echo "- SDK metadata for CMake and pkg-config consumers."
            echo
            echo "## Downloads"
            echo
            echo "| File | Platform | Checksum |"
            echo "| --- | --- | --- |"
            for row in \
              "linux-x86_64|Linux x86_64" \
              "linux-aarch64|Linux aarch64" \
              "macos-x86_64|macOS x86_64" \
              "macos-aarch64|macOS arm64" \
              "freebsd-x86_64|FreeBSD x86_64" \
              "openbsd-x86_64|OpenBSD x86_64" \
              "netbsd-x86_64|NetBSD x86_64" \
              "dragonflybsd-x86_64|DragonFly BSD x86_64" \
              "windows-x86_64|Windows x86_64"; do
              target="${row%%|*}"
              label="${row#*|}"
              case "$target" in
                windows-*) ext="zip" ;;
                *) ext="tar.xz" ;;
              esac
              file="llam-${version}-${target}.${ext}"
              checksum="${file}.sha256"
              if [ -f "$file" ]; then
                echo "| [${file}](${base_url}/${file}) | ${label} | [checksum](${base_url}/${checksum}) |"
              fi
            done
            echo
            echo "## Package Contents"
            echo
            echo "- Public headers under \`include/\`."
            echo "- Static runtime library: \`libllam_runtime.a\` on POSIX or \`llam_runtime.lib\` on Windows."
            echo "- Platform shared runtime library: \`libllam_runtime.so\`, \`libllam_runtime.dylib\`, or \`llam_runtime.dll\`."
            echo "- CMake package files under \`share/llam/cmake/\` and pkg-config metadata under \`lib/pkgconfig/\`."
            echo "- Archive installers: \`install.sh --prefix <dir>\` on POSIX and \`install.ps1 -Prefix <dir>\` on Windows."
            echo "- Docs, examples, \`CHANGELOG.md\`, and bundled smoke executables where supported."
            echo
            echo "## Changelog"
            echo
            echo "- [CHANGELOG.md](${base_url}/CHANGELOG.md) is attached to this release and included inside every platform archive."
            echo
            cat "$changelog_section"
            echo
            echo "## Standalone Installers"
            echo
            echo "| File | Use | Checksum |"
            echo "| --- | --- | --- |"
            echo "| [install.sh](${base_url}/install.sh) | POSIX release archives | [checksum](${base_url}/install.sh.sha256) |"
            echo "| [install.ps1](${base_url}/install.ps1) | Windows release archives | [checksum](${base_url}/install.ps1.sha256) |"
            echo
            echo "## Install Commands"
            echo
            echo "POSIX auto-detect:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "POSIX explicit target:"
            echo
            echo "\`\`\`bash"
            echo "curl -fsSL ${base_url}/install.sh | sh -s -- --version ${version} --base-url \"${base_url}\" --target macos-aarch64 --prefix \"\$HOME/.local\""
            echo "\`\`\`"
            echo
            echo "Windows x86_64:"
            echo
            echo "\`\`\`powershell"
            echo "Invoke-WebRequest \"${base_url}/install.ps1\" -OutFile install.ps1; .\\install.ps1 -Version ${version} -BaseUrl \"${base_url}\" -Prefix \"\$env:LOCALAPPDATA\\LLAM\""
            echo "\`\`\`"
            echo
            echo "## Verification"
            echo
            echo "- Release workflow succeeded: ${run_url}"
            echo "- Release target commit: \`${RELEASE_SHA}\`."
            echo "- Full checksum manifest: [SHA256SUMS](${base_url}/SHA256SUMS)."
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: LLAM ${{ github.ref_name }}
          body_path: release-artifacts/RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/*.tar.xz.sha256
            release-artifacts/*.zip
            release-artifacts/*.zip.sha256
            release-artifacts/install.sh
            release-artifacts/install.sh.sha256
            release-artifacts/install.ps1
            release-artifacts/install.ps1.sha256
            release-artifacts/CHANGELOG.md
            release-artifacts/CHANGELOG.md.sha256
            release-artifacts/SHA256SUMS
