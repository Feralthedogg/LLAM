name: Release

permissions:
  contents: write

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-artifacts:
    name: build-artifacts (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            cc: gcc
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            cc: gcc
          - target: macos-x86_64
            runner: macos-15-intel
            cc: clang
          - target: macos-aarch64
            runner: macos-14
            cc: clang

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential ca-certificates cmake git python3 xz-utils

      - name: Build liburing
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/axboe/liburing.git /tmp/liburing
          make -C /tmp/liburing -j"$(nproc)"
          sudo make -C /tmp/liburing install
          sudo ldconfig

      - name: Build and test
        run: |
          version="1.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          make clean all test CC="${{ matrix.cc }}" LLAM_VERSION="$version"

      - name: Smoke test runtime executables
        run: |
          ./demo
          LLAM_BENCH_ROUNDS=1 LLAM_BENCH_IO_MESSAGES=32 LLAM_BENCH_POLL_EVENTS=32 ./bench
          LLAM_STRESS_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_ROUNDS=1 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_WAITERS=32 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_ROUNDS=256 \
          LLAM_STRESS_DYNAMIC_LIVE_POLL_MONITOR_US=1000 \
          ./stress

      - name: Package release archive
        run: |
          version="1.0.0"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          LLAM_RELEASE_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}" \
          LLAM_VERSION="$version" \
            ./scripts/package_release.sh "${{ matrix.target }}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            target/dist/*.tar.xz
            target/dist/*.tar.xz.sha256
          if-no-files-found: error

  publish-release:
    name: publish-release
    needs:
      - build-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Build checksum manifest
        run: |
          cd release-artifacts
          cat *.sha256 | sort -k2 > SHA256SUMS

      - name: Build release notes
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          cd release-artifacts
          version="${TAG#v}"
          base_url="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          run_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          {
            echo "# LLAM ${version}"
            echo
            echo "LLAM ${version} publishes native runtime builds for Linux and macOS."
            echo "Native Windows 10/11 support is planned but not shipped in this release."
            echo
            echo "## Highlights"
            echo
            echo "- Native Darwin x86_64 assembly context switching for Intel Mac builds."
            echo "- kqueue-based macOS I/O backend for both Apple Silicon and Intel Mac."
            echo "- io_uring/liburing Linux I/O backend for x86_64 and aarch64."
            echo "- Windows roadmap documented for the planned IOCP/Fiber backend."
            echo "- SDK metadata for CMake and pkg-config consumers."
            echo
            echo "## Downloads"
            echo
            echo "| File | Platform | Checksum |"
            echo "| --- | --- | --- |"
            for row in \
              "linux-x86_64|Linux x86_64" \
              "linux-aarch64|Linux aarch64" \
              "macos-x86_64|macOS x86_64" \
              "macos-aarch64|macOS arm64"; do
              target="${row%%|*}"
              label="${row#*|}"
              file="llam-${version}-${target}.tar.xz"
              checksum="${file}.sha256"
              if [ -f "$file" ]; then
                echo "| [${file}](${base_url}/${file}) | ${label} | [checksum](${base_url}/${checksum}) |"
              fi
            done
            echo
            echo "## Package Contents"
            echo
            echo "- Public headers under \`include/\`."
            echo "- Static runtime library: \`libllam_runtime.a\`."
            echo "- Platform shared runtime library: \`libllam_runtime.so\` or \`libllam_runtime.dylib\`."
            echo "- CMake package files under \`share/llam/cmake/\` and pkg-config metadata under \`lib/pkgconfig/\`."
            echo "- Optional archive installer: \`install.sh --prefix <dir>\`."
            echo "- Docs, examples, and the bundled \`demo\`, \`stress\`, and \`bench\` executables."
            echo
            echo "## Windows Status"
            echo
            echo "Native Windows archives are not published for ${version}. Use WSL to verify the Linux backend on Windows hosts until the native IOCP/Fiber backend lands."
            echo
            echo "## Verification"
            echo
            echo "- Release workflow succeeded: ${run_url}"
            echo "- Release target commit: \`${RELEASE_SHA}\`."
            echo "- Full checksum manifest: [SHA256SUMS](${base_url}/SHA256SUMS)."
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: LLAM ${{ github.ref_name }}
          body_path: release-artifacts/RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/*.tar.xz.sha256
            release-artifacts/SHA256SUMS
